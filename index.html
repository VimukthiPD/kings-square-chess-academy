<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>King's Square Chess Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dark: #8a6f2e;
      --dark: #0a0a0f;
      --dark2: #12121a;
      --dark3: #1a1a26;
      --dark4: #222233;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --error: #e05555;
      --success: #4caf7d;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated chessboard background */
    .bg-board {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      opacity: 0.04;
      z-index: 0;
    }
    .bg-board div:nth-child(odd) { background: var(--gold); }
    .bg-board div:nth-child(even) { background: transparent; }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .chess-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .logo-area h1 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      line-height: 1.3;
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    .logo-area p {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .card {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
    }

    .card h2 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold-light);
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: var(--dark);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,168,76,0.3);
    }

    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .msg.error { background: rgba(224,85,85,0.15); border: 1px solid rgba(224,85,85,0.3); color: var(--error); display: block; }
    .msg.success { background: rgba(76,175,125,0.15); border: 1px solid rgba(76,175,125,0.3); color: var(--success); display: block; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
      margin: 28px 0;
    }

    .footer-text {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-board" id="bgBoard"></div>
  <div class="bg-glow"></div>

  <!-- Login -->
  <div class="login-container">
    <div class="logo-area">
      <span class="chess-icon">♔</span>
      <h1>King's Square<br>Chess Academy</h1>
      <p>Member Portal</p>
    </div>

    <div class="card">
      <h2>Sign In to Your Account</h2>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" />
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Enter Portal</button>

      <div class="msg" id="loginMsg"></div>

      <div class="divider"></div>
      <p class="footer-text">Contact your supervisor if you need access</p>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDAHdTrbNkmMh1kMPt_5ynOO90gLIyeE1M",
      authDomain: "king-s-square-chess-academy.firebaseapp.com",
      projectId: "king-s-square-chess-academy",
      storageBucket: "king-s-square-chess-academy.firebasestorage.app",
      messagingSenderId: "1011218662349",
      appId: "1:1011218662349:web:1abd01e4e37ca1256d3a84",
      measurementId: "G-YE8ZPHHN3F"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Check if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists() && userDoc.data().role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }
      }
    });

    window.handleLogin = async function() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('loginMsg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter your email and password.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, "users", cred.user.uid));
        if (userDoc.exists() && userDoc.data().role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "dashboard.html";
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'Invalid email or password. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Enter Portal';
      }
    };

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>

  <script>
    // Generate chessboard background
    const board = document.getElementById('bgBoard');
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const cell = document.createElement('div');
        if ((r + c) % 2 === 0) cell.style.background = 'var(--gold)';
        board.appendChild(cell);
      }
    }
  </script>
</body>
</html>
