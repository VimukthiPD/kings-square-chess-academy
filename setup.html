<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup Admin — King's Square</title>
  <style>
    body { font-family: sans-serif; background: #0a0a0f; color: #e8e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #12121a; border: 1px solid #c9a84c44; border-radius: 14px; padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    h2 { color: #c9a84c; font-size: 20px; margin-bottom: 8px; }
    p { color: #8888aa; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; background: #1a1a26; border: 1px solid #c9a84c33; border-radius: 8px; padding: 12px; color: #e8e8f0; font-size: 14px; margin-bottom: 12px; outline: none; }
    button { width: 100%; background: linear-gradient(135deg, #8a6f2e, #c9a84c); border: none; border-radius: 8px; padding: 14px; color: #0a0a0f; font-size: 14px; font-weight: 700; cursor: pointer; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
    .success { background: rgba(76,175,125,0.15); border: 1px solid rgba(76,175,125,0.3); color: #4caf7d; display: block; }
    .error { background: rgba(224,85,85,0.15); border: 1px solid rgba(224,85,85,0.3); color: #e05555; display: block; }
    .warning { background: rgba(224,160,48,0.12); border: 1px solid rgba(224,160,48,0.3); color: #e0a030; display: block; margin-bottom: 20px; font-size: 13px; }
  </style>
</head>
<body>
<div class="box">
  <h2>♔ Admin Setup</h2>
  <p>Run this ONCE to create your admin account. Delete this file after setup.</p>
  <div class="warning">⚠️ This page creates the supervisor/admin account. Only use it once!</div>
  <input type="email" id="email" value="vimukthid2003@gmail.com" />
  <input type="password" id="password" placeholder="Create your admin password (min 6 chars)" />
  <button onclick="setup()">Create Admin Account</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAHdTrbNkmMh1kMPt_5ynOO90gLIyeE1M",
    authDomain: "king-s-square-chess-academy.firebaseapp.com",
    projectId: "king-s-square-chess-academy",
    storageBucket: "king-s-square-chess-academy.firebasestorage.app",
    messagingSenderId: "1011218662349",
    appId: "1:1011218662349:web:1abd01e4e37ca1256d3a84"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.setup = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    msg.className = 'msg'; msg.textContent = '';

    if (!password || password.length < 6) {
      msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", cred.user.uid), {
        name: "Vimukthi (Admin)",
        email,
        role: "admin",
        createdAt: serverTimestamp()
      });
      msg.className = 'msg success';
      msg.textContent = '✅ Admin account created! You can now log in at index.html. Please delete this setup.html file from GitHub.';
    } catch (e) {
      msg.className = 'msg error';
      msg.textContent = e.code === 'auth/email-already-in-use'
        ? '⚠️ This email is already registered. If you already ran setup, go to index.html and log in.'
        : 'Error: ' + e.message;
    }
  };
</script>
</body>
</html>
